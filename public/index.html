<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Air Quality Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin: 20px 0;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.2s;
        }
        .card h3 {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2980b9;
        }
        .card .unit {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-left: 2px;
        }
        .chart-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
            height: 30vh;
            min-height: 250px;
        }
        .chart-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: left;
        }
        .status {
            text-align: center;
            font-size: 0.75rem;
            color: #95a5a6;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        /* Mobile Adjustments */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .dashboard-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
            .card {
                padding: 20px;
            }
            .card .value {
                font-size: 2.2rem;
            }
            .chart-container {
                padding: 20px;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Air Quality</h1>
        
        <div class="dashboard-grid">
            <div class="card">
                <h3>Temp</h3>
                <div class="value"><span id="temp">--</span><span class="unit">°C</span></div>
            </div>
            <div class="card">
                <h3>Humidity</h3>
                <div class="value"><span id="humidity">--</span><span class="unit">%</span></div>
            </div>
            <div class="card">
                <h3>PM 2.5</h3>
                <div class="value"><span id="pm25">--</span><span class="unit">µg</span></div>
            </div>
            <div class="card">
                <h3>PM 10</h3>
                <div class="value"><span id="pm10">--</span><span class="unit">µg</span></div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">PM 2.5 History</div>
            <canvas id="pm25Chart"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-title">PM 10 History</div>
            <canvas id="pm10Chart"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-title">Temperature History</div>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="status" id="lastUpdated">Last updated: --</div>
    </div>

    <script>
        let pm25Chart, pm10Chart, tempChart;

        async function updateDashboard() {
            try {
                const latestRes = await fetch('/api/latest');
                const latest = await latestRes.json();

                if (latest) {
                    document.getElementById('temp').innerText = latest.temperature !== null ? latest.temperature.toFixed(1) : '--';
                    document.getElementById('humidity').innerText = latest.humidity !== null ? latest.humidity.toFixed(1) : '--';
                    document.getElementById('pm25').innerText = latest.sds_p2 !== null ? latest.sds_p2.toFixed(1) : '--';
                    document.getElementById('pm10').innerText = latest.sds_p1 !== null ? latest.sds_p1.toFixed(1) : '--';
                    document.getElementById('lastUpdated').innerText = `Last updated: ${new Date(latest.timestamp).toLocaleTimeString()}`;
                }

                const historyRes = await fetch('/api/history?hours=24');
                const history = await historyRes.json();

                updateChart(history);
            } catch (error) {
                console.error('Error updating dashboard:', error);
            }
        }

        function createChart(ctx, label, data, color, yMin, ySuggestedMax) {
            return new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '22',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'hour',
                                displayFormats: {
                                    hour: 'HH:mm'
                                },
                                tooltipFormat: 'HH:mm'
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 6,
                                font: { size: 10 }
                            }
                        },
                        y: {
                            min: yMin,
                            suggestedMax: ySuggestedMax,
                            beginAtZero: yMin === 0,
                            ticks: { font: { size: 10 } }
                        }
                    }
                }
            });
        }

        function updateChart(data) {
            const p25Data = data.map(d => ({ x: new Date(d.timestamp), y: d.sds_p2 }));
            const p10Data = data.map(d => ({ x: new Date(d.timestamp), y: d.sds_p1 }));
            const tempData = data.map(d => ({ x: new Date(d.timestamp), y: d.temperature }));

            if (pm25Chart) pm25Chart.destroy();
            if (pm10Chart) pm10Chart.destroy();
            if (tempChart) tempChart.destroy();

            pm25Chart = createChart(document.getElementById('pm25Chart').getContext('2d'), 'PM 2.5', p25Data, '#3498db', 0, 100);
            pm10Chart = createChart(document.getElementById('pm10Chart').getContext('2d'), 'PM 10', p10Data, '#2ecc71', 0, 100);
            tempChart = createChart(document.getElementById('tempChart').getContext('2d'), 'Temperature', tempData, '#e74c3c');
        }

        updateDashboard();
        setInterval(updateDashboard, 30000); // Update every 30 seconds
    </script>
</body>
</html>
